name: Deploy OCI ARM64

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build Spring Boot JAR
        run: |
          chmod +x ./gradlew
          ./gradlew clean build --no-daemon

      - name: Prepare Docker artifact jar
        run: |
          JAR_PATH=$(find build/libs -maxdepth 1 -type f -name "*.jar" ! -name "*-plain.jar" | head -n 1)
          if [ -z "$JAR_PATH" ]; then
            echo "No boot jar found under build/libs"
            exit 1
          fi
          cp "$JAR_PATH" app.jar

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            shinhyeok22/dumpster:latest
            shinhyeok22/dumpster:${{ github.sha }}

      - name: Deploy on OCI via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            DEPLOY_DIR="$HOME/deploy/dumpster"
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            rm -f docker-compose.yml
            echo 'services:' >> docker-compose.yml
            echo '  dumpster:' >> docker-compose.yml
            echo '    image: "shinhyeok22/dumpster:${{ github.sha }}"' >> docker-compose.yml
            echo '    container_name: "dumpster"' >> docker-compose.yml
            echo '    restart: "unless-stopped"' >> docker-compose.yml
            echo '    ports:' >> docker-compose.yml
            echo '      - "8808:8080"' >> docker-compose.yml
            echo '    mem_limit: "512m"' >> docker-compose.yml
            echo '    environment:' >> docker-compose.yml
            echo '      APP_BASE_URL: "https://debrisdecision.com"' >> docker-compose.yml
            echo '      APP_SEO_MAX_WAVE: "3"' >> docker-compose.yml
            echo '      APP_BUILD_SHA: "${{ github.sha }}"' >> docker-compose.yml
            echo '      JTE_DEVELOPMENT_MODE: "false"' >> docker-compose.yml
            echo '      JTE_USE_PRECOMPILED_TEMPLATES: "true"' >> docker-compose.yml
            echo '    deploy:' >> docker-compose.yml
            echo '      resources:' >> docker-compose.yml
            echo '        limits:' >> docker-compose.yml
            echo '          memory: "512M"' >> docker-compose.yml

            sed -i 's/\r$//' docker-compose.yml
            echo "[debug] generated docker-compose.yml"
            nl -ba docker-compose.yml
            docker compose config >/dev/null

            docker compose pull
            docker compose up -d --force-recreate --remove-orphans
            docker compose ps

            HEALTH_CODE="000"
            ROOT_CODE="000"
            CALC_CODE="000"

            for i in $(seq 1 30); do
              HEALTH_CODE=$(curl -sS -o /dev/null -w "%{http_code}" http://127.0.0.1:8808/api/health || true)
              ROOT_CODE=$(curl -sS -o /dev/null -w "%{http_code}" http://127.0.0.1:8808/ || true)
              CALC_CODE=$(curl -sS -o /dev/null -w "%{http_code}" http://127.0.0.1:8808/dumpster/size-weight-calculator || true)

              echo "[debug] attempt $i health=$HEALTH_CODE root=$ROOT_CODE calc=$CALC_CODE"

              if [ "$HEALTH_CODE" = "200" ] && [ "$ROOT_CODE" = "200" ] && [ "$CALC_CODE" = "200" ]; then
                break
              fi

              sleep 2
            done

            if [ "$HEALTH_CODE" != "200" ] || [ "$ROOT_CODE" != "200" ] || [ "$CALC_CODE" != "200" ]; then
              echo "Web route check failed after retries."
              docker compose logs --tail=200 dumpster
              exit 1
            fi
