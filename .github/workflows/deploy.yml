name: Deploy OCI ARM64

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build Spring Boot JAR
        run: |
          chmod +x ./gradlew
          ./gradlew clean build --no-daemon

      - name: Prepare Docker artifact jar
        run: |
          JAR_PATH=$(find build/libs -maxdepth 1 -type f -name "*.jar" ! -name "*-plain.jar" | head -n 1)
          if [ -z "$JAR_PATH" ]; then
            echo "No boot jar found under build/libs"
            exit 1
          fi
          cp "$JAR_PATH" app.jar

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            shinhyeok22/dumpster:latest
            shinhyeok22/dumpster:${{ github.sha }}

      - name: Deploy on OCI via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            DEPLOY_DIR="$HOME/deploy/dumpster"
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            cat > docker-compose.yml <<'YAML'
            version: "3.9"
            services:
              dumpster:
                image: "shinhyeok22/dumpster:latest"
                container_name: "dumpster"
                restart: "unless-stopped"
                ports:
                  - "8808:8080"
                mem_limit: "512m"
                environment:
                  APP_BASE_URL: "https://debrisdecision.com"
                  APP_SEO_MAX_WAVE: "2"
                deploy:
                  resources:
                    limits:
                      memory: "512M"
            YAML

            docker compose config >/dev/null

            docker compose pull
            docker compose up -d --remove-orphans
            docker compose ps
