spring.datasource.url=jdbc:h2:mem:dumpster_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=false

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

app.base-url=http://127.0.0.1:4173
app.base-url.enforce-domain=false
app.seo.max-wave=3
app.seo.intent-index-mode=curated
app.pricing.market-tier=national
app.tracking.rate-limit-per-minute=60
app.tracking.max-body-bytes=8192
app.tracking.retention-days=90
app.tracking.null-estimate-sample-rate=0.2
