spring.application.name=dumpster-calculator

spring.datasource.url=jdbc:h2:file:./data/dumpster;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=false

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

server.compression.enabled=true
server.compression.mime-types=text/html,text/css,application/javascript,application/json

# Keep runtime template compilation off by default for self-contained JAR deploys.
gg.jte.developmentMode=${JTE_DEVELOPMENT_MODE:false}

app.base-url=${APP_BASE_URL:https://debrisdecision.com}
app.base-url.enforce-domain=${APP_BASE_URL_ENFORCE_DOMAIN:true}
app.seo.max-wave=${APP_SEO_MAX_WAVE:2}
app.tracking.rate-limit-per-minute=60
app.tracking.max-body-bytes=8192
app.tracking.retention-days=90
app.tracking.null-estimate-sample-rate=0.2
